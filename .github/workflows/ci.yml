name: CI

#mainブランチへのPRが作られた時にワークフローが動く
on:
  pull_request:
    branches: [main]

#ワークフローに与える権限を最低限る。
#コードの読み取りだけで、書き込みやパッケージのpushは不可。セキュリティのベストプラクティス。
permissions:
  contents: read

#lint、test、buildのジョブにneedsで依存設定していない。
#ゆえに三つのジョブが並行で動く。
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    #実行環境。mac、windowsはより多く時間かかる。こだわりなければubuntu。
    steps:
      - uses: actions/checkout@v4
      #まず仮想環境にコピーする。そして実行。これはすべてのワークフローで共通。
      #何もない環境で実行することで再現可能にする。

#Goセットアップ。
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
#Golintの設定使う
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
#フロントエンドのlint。eslint.config.mjsが設定。
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -shuffle=on -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build todo-api
        run: go build ./cmd/todo-api

      - name: Build event-worker
        run: go build ./cmd/event-worker

      - name: Build compaction
        run: go build ./cmd/compaction

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

#npm ciはクリーンインストール。npm installはlockファイルを更新するかもしれない。
#npm ciはlockファイルとpackage.jsonに矛盾があればエラーで止まる。node_modulesを全削除してから入れ直す。