apiVersion: 1
policies:
  - orgId: 1
    receiver: discord-warning
    group_by: ["alertname", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: discord-critical
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 3m
        repeat_interval: 1h
        continue: false
