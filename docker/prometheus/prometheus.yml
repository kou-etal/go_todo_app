global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "todo-api"
    static_configs:
      - targets: ["app:9090"]

  - job_name: "event-worker"
    static_configs:
      - targets: ["event-worker:9090"]

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
